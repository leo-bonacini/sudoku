<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1, user-scalable=no">
<title>Sudoku</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<div id="app">

  <!-- ============ TOP BAR ============ -->
  <header class="topbar">
    <button id="btn-menu" class="icon-btn" aria-label="Open menu" title="Menu">☰</button>
    <h1 class="app-title">Sudoku</h1>
    <div class="topbar-actions">
      <button id="btn-contrast" class="icon-btn" aria-label="Toggle high contrast" title="High contrast">◐</button>
      <button id="btn-sound" class="icon-btn" aria-label="Toggle sound" title="Sound">🔇</button>
      <button id="btn-theme" class="icon-btn" aria-label="Toggle dark/light theme" title="Theme">🌙</button>
    </div>
  </header>

  <!-- ============ MAIN GAME LAYOUT ============ -->
  <main class="game-layout">

    <section class="board-panel">

      <div class="game-info" role="status" aria-live="polite">
        <span id="difficulty-label" class="difficulty-badge">Easy</span>
        <span id="timer-display" class="timer">00:00</span>
        <button id="btn-pause" class="icon-btn" aria-label="Pause game" title="Pause">⏸</button>
      </div>

      <div class="progress-track" aria-hidden="true">
        <div id="progress-fill" class="progress-fill"></div>
      </div>

      <div class="board-wrapper">
        <div id="board" class="board" role="grid" aria-label="Sudoku 9 by 9 board"></div>

        <div id="pause-overlay" class="overlay hidden">
          <div class="overlay-card">
            <p>Game Paused</p>
            <button id="btn-resume" class="btn primary">Resume</button>
          </div>
        </div>

        <div id="victory-overlay" class="overlay hidden">
          <div class="overlay-card">
            <p class="victory-title">Puzzle Solved!</p>
            <p id="victory-time" class="victory-detail"></p>
            <p id="victory-best" class="victory-detail"></p>
            <button id="btn-victory-new" class="btn primary">New Game</button>
            <button id="btn-victory-close" class="btn">Close</button>
          </div>
        </div>

        <div id="confetti-layer" class="confetti-layer" aria-hidden="true"></div>
      </div>

      <div class="number-pad" id="number-pad" role="group" aria-label="Number pad"></div>

      <div class="action-bar">
        <button id="btn-undo" class="btn" aria-label="Undo" title="Undo (Ctrl+Z)"><span class="ico">↶</span>Undo</button>
        <button id="btn-redo" class="btn" aria-label="Redo" title="Redo (Ctrl+Y)"><span class="ico">↷</span>Redo</button>
        <button id="btn-erase" class="btn" aria-label="Erase cell" title="Erase (Delete)"><span class="ico">⌫</span>Erase</button>
        <button id="btn-notes" class="btn" aria-label="Toggle notes mode" title="Notes (N)"><span class="ico">✎</span>Notes</button>
        <button id="btn-hint" class="btn" aria-label="Get a hint" title="Hint"><span class="ico">💡</span>Hint <span id="hints-left">3</span></button>
      </div>

    </section>

    <aside class="side-panel">
      <div class="panel-card">
        <h2 class="panel-title">Status</h2>
        <div class="stat-row"><span>Mistakes</span><strong id="mistakes-count">0</strong></div>
        <div class="stat-row"><span>Hints used</span><strong id="hints-used-count">0</strong></div>
        <div class="stat-row"><span>Filled</span><strong id="progress-count">0%</strong></div>
      </div>

      <div class="panel-card">
        <h2 class="panel-title">Puzzle</h2>
        <button id="btn-check" class="btn full">Check Board</button>
        <button id="btn-export" class="btn full">Export Puzzle</button>
        <button id="btn-import" class="btn full">Import Puzzle</button>
        <button id="btn-daily" class="btn full">Daily Challenge</button>
      </div>
    </aside>

  </main>

  <!-- ============ MAIN MENU ============ -->
  <div id="menu-overlay" class="modal-overlay">
    <div class="modal" role="dialog" aria-modal="true" aria-labelledby="menu-modal-title" tabindex="-1">
      <button id="btn-menu-close" class="icon-btn modal-close" aria-label="Close menu" title="Close">✕</button>
      <h2 class="modal-title" id="menu-modal-title">Sudoku</h2>

      <div id="difficulty-select" class="difficulty-grid">
        <button class="btn difficulty-btn" data-difficulty="easy">Easy</button>
        <button class="btn difficulty-btn" data-difficulty="medium">Medium</button>
        <button class="btn difficulty-btn" data-difficulty="hard">Hard</button>
        <button class="btn difficulty-btn" data-difficulty="expert">Expert</button>
      </div>

      <button id="btn-continue" class="btn full primary">Continue Game</button>
      <button id="btn-stats" class="btn full">Statistics</button>
      <button id="btn-settings" class="btn full">Settings</button>
    </div>
  </div>

  <!-- ============ SETTINGS MODAL ============ -->
  <div id="settings-modal" class="modal-overlay hidden">
    <div class="modal" role="dialog" aria-modal="true" aria-labelledby="settings-modal-title" tabindex="-1">
      <h2 class="modal-title" id="settings-modal-title">Settings</h2>

      <label class="setting-row">
        <span>Dark mode</span>
        <input type="checkbox" id="setting-dark-mode">
      </label>
      <label class="setting-row">
        <span>Animations</span>
        <input type="checkbox" id="setting-animations" checked>
      </label>
      <label class="setting-row">
        <span>Sound</span>
        <input type="checkbox" id="setting-sound">
      </label>
      <label class="setting-row">
        <span>Highlight conflicts</span>
        <input type="checkbox" id="setting-highlight-conflicts" checked>
      </label>
      <label class="setting-row">
        <span>Auto-save</span>
        <input type="checkbox" id="setting-auto-save" checked>
      </label>
      <label class="setting-row">
        <span>Show timer</span>
        <input type="checkbox" id="setting-show-timer" checked>
      </label>
      <label class="setting-row">
        <span>High contrast</span>
        <input type="checkbox" id="setting-high-contrast">
      </label>

      <button id="btn-settings-close" class="btn full primary">Done</button>
    </div>
  </div>

  <!-- ============ STATISTICS MODAL ============ -->
  <div id="stats-modal" class="modal-overlay hidden">
    <div class="modal" role="dialog" aria-modal="true" aria-labelledby="stats-modal-title" tabindex="-1">
      <h2 class="modal-title" id="stats-modal-title">Statistics</h2>
      <div class="stat-row"><span>Games played</span><strong id="stat-played">0</strong></div>
      <div class="stat-row"><span>Games won</span><strong id="stat-won">0</strong></div>
      <div class="stat-row"><span>Completion</span><strong id="stat-completion">0%</strong></div>
      <div class="stat-row"><span>Average time</span><strong id="stat-avg-time">--:--</strong></div>
      <div class="stat-row"><span>Hints used</span><strong id="stat-hints">0</strong></div>
      <div class="stat-row"><span>Mistakes</span><strong id="stat-mistakes">0</strong></div>
      <h3 class="panel-subtitle">Best Times</h3>
      <div class="stat-row"><span>Easy</span><strong id="stat-best-easy">--:--</strong></div>
      <div class="stat-row"><span>Medium</span><strong id="stat-best-medium">--:--</strong></div>
      <div class="stat-row"><span>Hard</span><strong id="stat-best-hard">--:--</strong></div>
      <div class="stat-row"><span>Expert</span><strong id="stat-best-expert">--:--</strong></div>
      <button id="btn-stats-close" class="btn full primary">Close</button>
    </div>
  </div>

  <!-- ============ EXPORT / IMPORT MODAL ============ -->
  <div id="io-modal" class="modal-overlay hidden">
    <div class="modal" role="dialog" aria-modal="true" aria-labelledby="io-modal-title" tabindex="-1">
      <h2 class="modal-title" id="io-modal-title">Export Puzzle</h2>
      <textarea id="io-textarea" class="io-textarea" rows="4" aria-label="Puzzle code"></textarea>
      <div id="io-import-actions" class="hidden">
        <button id="btn-io-load" class="btn full primary">Load Puzzle</button>
      </div>
      <button id="btn-io-close" class="btn full">Close</button>
    </div>
  </div>

  <div id="toast" class="toast hidden" role="alert"></div>

</div>
<script src="script.js"></script>
</body>
</html>
